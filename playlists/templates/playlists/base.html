{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyPlaylistApp{% endblock %}</title>
    
    <!-- Google Fonts: Playfair Display (Serif Heading) & Lora (Serif Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Our custom style.css (with theme variables and typography mappings) -->
    <link rel="stylesheet" href="{% static 'playlists/css/style.css' %}">
    
    <!-- Script to set the initial theme before rendering to avoid flicker -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
        })();
    </script>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navigation Menu -->
    <nav class="navbar navbar-expand-lg border-bottom sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold fs-3" href="{% url 'home' %}">
                <i class="bi bi-music-note-beamed me-2 text-primary"></i> MyPlaylistApp
            </a>
            
            <div class="d-flex align-items-center gap-2 order-lg-last">
                <!-- Theme Changer Button -->
                <button class="btn btn-outline-secondary rounded-circle p-2 d-flex align-items-center justify-content-center" id="theme-toggle" type="button" aria-label="Toggle theme" style="width: 40px; height: 40px;">
                    <i class="bi bi-sun-fill d-none" id="theme-icon-light"></i>
                    <i class="bi bi-moon-fill" id="theme-icon-dark"></i>
                </button>
                
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item">
                        <a class="nav-link px-3 {% if request.resolver_match.url_name == 'home' %}active fw-bold{% endif %}" href="{% url 'home' %}">
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 {% if request.resolver_match.url_name == 'playlist_list' or request.resolver_match.url_name == 'playlist_detail' %}active fw-bold{% endif %}" href="{% url 'playlist_list' %}">
                            Playlists
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 text-warning fw-semibold" href="/admin/" target="_blank">
                            Admin
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="container my-5 flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="py-4 mt-auto border-top">
        <div class="container text-center">
            <p class="mb-1 fw-semibold">&copy; 2026 MyPlaylistApp. All rights reserved.</p>
            <p class="small text-secondary mb-0">Elegant Magazine-Style Layout (Serif Typography & Theme Changer)</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Theme Toggle Logic Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggleButton = document.getElementById('theme-toggle');
            const lightIcon = document.getElementById('theme-icon-light');
            const darkIcon = document.getElementById('theme-icon-dark');
            
            function updateIcons(theme) {
                if (theme === 'dark') {
                    lightIcon.classList.add('d-none');
                    darkIcon.classList.remove('d-none');
                } else {
                    lightIcon.classList.remove('d-none');
                    darkIcon.classList.add('d-none');
                }
            }
            
            // Sync icons on page load
            const currentTheme = document.documentElement.getAttribute('data-bs-theme');
            updateIcons(currentTheme);
            
            // Click Handler
            toggleButton.addEventListener('click', function() {
                const targetTheme = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-bs-theme', targetTheme);
                localStorage.setItem('theme', targetTheme);
                updateIcons(targetTheme);
            });
        });
    </script>
</body>
</html>
